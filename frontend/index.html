<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Catalog & Library Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width: 1200px;">
    <header class="mb-4">
      <h1 class="h3">🎮 Game Catalog & Library</h1>
      <div id="alerta" class="alert alert-danger d-none" role="alert"></div>
    </header>

    <div class="row g-4">
      <section class="col-lg-4">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-primary text-white fw-bold">👤 Jogadores</div>
          <div class="card-body">
            <form id="form-jogador" class="row g-2 mb-3">
              <div class="col-12"><input type="text" id="jog-nome" class="form-control" placeholder="Nome" required></div>
              <div class="col-12"><input type="email" id="jog-email" class="form-control" placeholder="E-mail" required></div>
              <div class="col-12"><input type="password" id="jog-senha" class="form-control" placeholder="Senha" required></div>
              <div class="col-12"><button type="submit" class="btn btn-primary w-100">Cadastrar Jogador</button></div>
            </form>
            <ul id="lista-jogadores" class="list-group"></ul>
          </div>
        </div>
      </section>

      <section class="col-lg-4">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-success text-white fw-bold">🕹️ Catálogo de Jogos</div>
          <div class="card-body">
            <form id="form-jogo" class="row g-2 mb-3">
              <div class="col-12"><input type="text" id="jogo-titulo" class="form-control" placeholder="Título" required></div>
              <div class="col-6"><input type="text" id="jogo-genero" class="form-control" placeholder="Gênero" required></div>
              <div class="col-6"><input type="text" id="jogo-plataforma" class="form-control" placeholder="Plataforma" required></div>
              <div class="col-12"><input type="text" id="jogo-desenvolvedora" class="form-control" placeholder="Desenvolvedora" required></div>
              <div class="col-12"><input type="url" id="jogo-capa" class="form-control" placeholder="URL da Capa (Opcional)"></div>
              <div class="col-12"><button type="submit" class="btn btn-success w-100">Cadastrar Jogo</button></div>
            </form>
            <ul id="lista-jogos" class="list-group"></ul>
          </div>
        </div>
      </section>

      <section class="col-lg-4">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-dark text-white fw-bold">📚 Vínculo de Biblioteca</div>
          <div class="card-body">
            <form id="form-biblioteca" class="row g-2 mb-3">
              <div class="col-12">
                <select id="bib-jogador" class="form-select" required>
                  <option value="">Selecione o Jogador...</option>
                </select>
              </div>
              <div class="col-12">
                <select id="bib-jogo" class="form-select" required>
                  <option value="">Selecione o Jogo...</option>
                </select>
              </div>
              <div class="col-12">
                <input type="number" id="bib-horas" class="form-control" placeholder="Horas Jogadas" min="0" value="0">
              </div>
              <div class="col-12"><button type="submit" class="btn btn-dark w-100">Adicionar à Biblioteca</button></div>
            </form>
            
            <hr>
            <h5 class="h6 fw-bold mb-2">Visualizar Biblioteca do Jogador:</h5>
            <select id="filtro-jogador-biblioteca" class="form-select mb-3">
              <option value="">Escolha um jogador para ver seus jogos...</option>
            </select>
            <ul id="lista-biblioteca" class="list-group"></ul>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
